{% extends 'base.html' %}
{% block content %}
<h1>Available Products</h1>
<div class="product-grid">
{% for p in products %}
    <div class="product-card">
        <div class="product-name">{{ p[1] }}</div>
        <div class="product-price">${{ p[2] }}</div>
        <a href="/add/{{ p[0] }}" class="btn">Add to Cart</a>
    </div>
{% endfor %}
</div>
{% endblock %}
